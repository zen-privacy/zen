name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Linux (deb + rpm)
        run: npx tauri build --bundles deb,rpm

      - name: List built files
        run: |
          echo "=== DEB files ==="
          find src-tauri/target/release/bundle -name "*.deb" -type f
          echo "=== RPM files ==="
          find src-tauri/target/release/bundle -name "*.rpm" -type f

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Windows (nsis)
        run: npx tauri build --bundles nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Build macOS (dmg)
        run: npx tauri build --target ${{ matrix.target }} --bundles dmg

      - name: List built files
        run: |
          echo "=== DMG files ==="
          find src-tauri/target -name "*.dmg" -type f

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-builds
          path: artifacts/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: artifacts/windows

      - name: Download macOS aarch64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-builds-aarch64-apple-darwin
          path: artifacts/macos

      - name: Download macOS x86_64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-builds-x86_64-apple-darwin
          path: artifacts/macos

      - name: List artifacts
        run: |
          echo "=== All artifacts ==="
          find artifacts -type f -ls

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Generate manifest.json
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")

          echo "=== Looking for artifacts ==="
          find artifacts -type f -ls

          WIN_FILE=$(find artifacts -name "*.exe" -type f | head -n1)
          DEB_FILE=$(find artifacts -name "*.deb" -type f | head -n1)
          RPM_FILE=$(find artifacts -name "*.rpm" -type f | head -n1)
          DMG_AARCH64_FILE=$(find artifacts -name "*aarch64*" -o -name "*arm64*" | head -n1)
          DMG_X64_FILE=$(find artifacts -name "*x64*" -o -name "*x86_64*" | grep "\.dmg$" | head -n1)

          # If we can't distinguish by name, just grab them in order
          if [ -z "$DMG_AARCH64_FILE" ] || [ -z "$DMG_X64_FILE" ]; then
            DMG_FILES=$(find artifacts/macos -name "*.dmg" -type f | sort)
            DMG_AARCH64_FILE=$(echo "$DMG_FILES" | head -n1)
            DMG_X64_FILE=$(echo "$DMG_FILES" | tail -n1)
          fi

          echo "Files found:"
          echo "  WIN: $WIN_FILE"
          echo "  DEB: $DEB_FILE"
          echo "  RPM: $RPM_FILE"
          echo "  DMG_AARCH64: $DMG_AARCH64_FILE"
          echo "  DMG_X64: $DMG_X64_FILE"

          WIN_SHA=$(sha256sum "$WIN_FILE" | awk '{print $1}')
          DEB_SHA=$(sha256sum "$DEB_FILE" | awk '{print $1}')
          RPM_SHA=$(sha256sum "$RPM_FILE" | awk '{print $1}')
          DMG_AARCH64_SHA=$(sha256sum "$DMG_AARCH64_FILE" | awk '{print $1}')
          DMG_X64_SHA=$(sha256sum "$DMG_X64_FILE" | awk '{print $1}')

          WIN_NAME=$(basename "$WIN_FILE")
          DEB_NAME=$(basename "$DEB_FILE")
          RPM_NAME=$(basename "$RPM_FILE")
          DMG_AARCH64_NAME=$(basename "$DMG_AARCH64_FILE")
          DMG_X64_NAME=$(basename "$DMG_X64_FILE")

          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}"

          jq -n \
            --arg version "$VERSION" \
            --arg notes "Release $VERSION" \
            --arg win_url "$BASE_URL/$WIN_NAME" \
            --arg win_sha "$WIN_SHA" \
            --arg deb_url "$BASE_URL/$DEB_NAME" \
            --arg deb_sha "$DEB_SHA" \
            --arg rpm_url "$BASE_URL/$RPM_NAME" \
            --arg rpm_sha "$RPM_SHA" \
            --arg macos_aarch64_url "$BASE_URL/$DMG_AARCH64_NAME" \
            --arg macos_aarch64_sha "$DMG_AARCH64_SHA" \
            --arg macos_x64_url "$BASE_URL/$DMG_X64_NAME" \
            --arg macos_x64_sha "$DMG_X64_SHA" \
            '{
              version: $version,
              notes: $notes,
              assets: {
                windows: { url: $win_url, sha256: $win_sha },
                deb: { url: $deb_url, sha256: $deb_sha },
                rpm: { url: $rpm_url, sha256: $rpm_sha },
                macos: { url: $macos_aarch64_url, sha256: $macos_aarch64_sha },
                "macos-x64": { url: $macos_x64_url, sha256: $macos_x64_sha }
              }
            }' > manifest.json

          echo "=== Generated manifest.json ==="
          cat manifest.json

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/linux/**/*.deb
            artifacts/linux/**/*.rpm
            artifacts/windows/*.exe
            artifacts/macos/*.dmg
            manifest.json
          generate_release_notes: true
